name: Build Appmql72 APK
on:
  push:
    paths:
      - 'apps/Appmql72/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: apps/Appmql72
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Appmql72-debug
          path: apps/Appmql72/app/build/outputs/apk/debug/app-debug.apk
